version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vietvoice_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vietvoice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: vietvoice_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: vietvoice_backend
    volumes:
      - ./backend:/app
      - ./outputs:/app/outputs
      - ./voices:/app/voices
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/vietvoice_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vietvoice_worker
    command: celery -A worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./outputs:/app/outputs
      - ./voices:/app/voices
      - ./models:/app/models
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/vietvoice_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vietvoice_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
